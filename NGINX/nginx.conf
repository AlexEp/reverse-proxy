# HTTP server to handle ACME challenge and redirect other traffic to HTTPS
server {
    listen 80;
    server_name my-star.duckdns.org;

    # This location is used by Certbot for the ACME challenge.
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Redirect all other HTTP requests to HTTPS on port 88
   location / {
        return 301 https://$host:88$request_uri;
    }
}

#HTTPS server using the certificate issued by Let’s Encrypt
server {
    listen 88 ssl;
    server_name my-star.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/my-star.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-star.duckdns.org/privkey.pem;

    # Proxy requests to your backend service running on port 5678.
    location / {
        proxy_pass http://host.docker.internal:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
