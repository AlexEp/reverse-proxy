# Server block for the Home Assistant subdomain
server {
    # Listen on port 80 for incoming connections
    listen 80;

    # The domain name this server block will respond to
    server_name homeasis.my-star.duckdns.org;

    # The root directory where the website files are located
    root /usr/share/nginx/html/homeasis;
    # The default file to serve
    index index.html;

    # Basic logging
    access_log /var/log/nginx/homeasis.access.log;
    error_log /var/log/nginx/homeasis.error.log;
}

# Server block for the n8n subdomain
server {
    # Listen on port 80 for incoming connections
    listen 80;

    # The domain name this server block will respond to
    server_name n8n.my-star.duckdns.org;

    # The root directory for this site's files
    root /usr/share/nginx/html/n8n;
    # The default file to serve
    index index.html;

    # Basic logging
    access_log /var/log/nginx/n8n.access.log;
    error_log /var/log/nginx/n8n.error.log;
}