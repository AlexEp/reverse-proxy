# Server block for the Home Assistant subdomain
server {
    # Listen on port 80 for incoming connections
    listen 80;

    # The domain name this server block will respond to
    server_name homeasis.my-star.duckdns.org;

    # The root directory where the website files are located
    root /usr/share/nginx/html/homeasis;
    # The default file to serve
    index index.html;

    # Basic logging
    access_log /var/log/nginx/homeasis.access.log;
    error_log /var/log/nginx/homeasis.error.log;
}

# Server block for the n8n subdomain
server {
    # Listen on port 80 for incoming connections
    listen 80;

    # The domain name this server block will respond to
    server_name n8n.my-star.duckdns.org;

    # The root directory for this site's files
    root /usr/share/nginx/html/n8n;
    # The default file to serve
    index index.html;

    # Basic logging
    access_log /var/log/nginx/n8n.access.log;
    error_log /var/log/nginx/n8n.error.log;
}

# --- HTTPS Server Blocks ---

# Server block for homeasis.my-star.duckdns.org with SSL
server {
    listen 443 ssl http2;
    server_name homeasis.my-star.duckdns.org;

    # IMPORTANT: Use the correct path to your SSL certificates
    ssl_certificate /etc/letsencrypt/live/my-star.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-star.duckdns.org/privkey.pem;

    location / {
        proxy_pass http://192.168.1.41:8123;
        # ... other proxy settings
    }

    access_log /var/log/nginx/homeasis.access.log;
    error_log /var/log/nginx/homeasis.error.log;
}

# Server block for n8n.my-star.duckdns.org with SSL
server {
    listen 443 ssl;
    listen 88 ssl; # Add this line
    http2 on;
    server_name n8n.my-star.duckdns.org;

    # IMPORTANT: Use the correct path to your SSL certificates
    ssl_certificate /etc/letsencrypt/live/my-star.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-star.duckdns.org/privkey.pem;

     location / {
        proxy_pass http://n8n:5678; 
       
       
        # Set headers to support WebSocket connections
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Set host and other standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase the timeout for long-polling connections
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        
        # Disable buffering to allow for real-time event streaming
        proxy_buffering off;
       
    }
    access_log /var/log/nginx/n8n.access.log;
    error_log /var/log/nginx/n8n.error.log;
}

