version: "3.8"

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      # The Caddy configuration file is located at ./Caddyfile/.Caddy
      - ./Caddyfile/.Caddy:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - my_network

  # This is a placeholder service. Replace with your actual backend application.
  backend:
    image: httpd:alpine
    container_name: backend
    restart: always
    networks:
      - my_network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "3003:443"
      - "80:80"
      - "88:88"
    volumes:
      - ./NGINX/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt
      - html:/usr/share/nginx/html
    networks:
      - my_network

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - certs:/etc/letsencrypt
      - html:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --agree-tos --email ${CERTBOT_EMAIL} -d ${CERTBOT_DOMAIN} --non-interactive
    networks:
      - my_network

networks:
  my_network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  certs:
  html:
