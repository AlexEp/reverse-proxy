version: "3.8"

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - my_network

  backend:
    image: my-backend-app
    container_name: backend
    restart: always
    networks:
      - my_network

networks:
  my_network:

volumes:
  caddy_data:
  caddy_config:
